name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  NODE_VERSION: 22
  PNPM_VERSION: 9.15.0
  IMAGE_NAME: sel/sel-frontend:latest
  CONTAINER_NAME: sel-frontend-container

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Restore .nuxt cache
        uses: actions/cache@v4
        with:
          path: .nuxt
          key: ${{ runner.os }}-nuxt-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nuxt-

      - name: Build Nuxt project
        run: |
          echo "🏗️ Building Nuxt 3 project..."
          NODE_OPTIONS="--max-old-space-size=4096" pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Docker context
        run: |
          mkdir -p docker-context
          cp -r .output docker-context/
          cp -r assets docker-context/
          cp Dockerfile docker-context/Dockerfile

      - name: Build Docker image
        run: |
          docker buildx build \
            --load \
            -t ${{ env.IMAGE_NAME }} \
            docker-context

      - name: Save Docker image
        run: |
          mkdir -p tmp
          docker save ${{ env.IMAGE_NAME }} -o tmp/frontend.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-docker-image
          path: tmp/frontend.tar
          retention-days: 1

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-docker-image
          path: tmp

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa

      - name: Install Cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Test SSH connection
        run: |
          ssh -o "ProxyCommand=/usr/local/bin/cloudflared access ssh --hostname ${{ secrets.DEPLOY_HOST }} \
          --service-token-id ${{ secrets.CF_ACCESS_CLIENT_ID }} \
          --service-token-secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
          -o StrictHostKeyChecking=no \
          ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "echo ✅ SSH via Cloudflare Access succeeded"

      - name: Copy Docker image to server
        run: |
          scp -o "ProxyCommand=/usr/local/bin/cloudflared access ssh --hostname ${{ secrets.DEPLOY_HOST }} \
          --service-token-id ${{ secrets.CF_ACCESS_CLIENT_ID }} \
          --service-token-secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
          -o StrictHostKeyChecking=no \
          tmp/frontend.tar \
          ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_TARGET }}

      - name: Deploy on server
        run: |
          ssh -o "ProxyCommand=/usr/local/bin/cloudflared access ssh --hostname ${{ secrets.DEPLOY_HOST }} \
          --service-token-id ${{ secrets.CF_ACCESS_CLIENT_ID }} \
          --service-token-secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
          -o StrictHostKeyChecking=no \
          ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "bash -c \"
            cd ${{ secrets.DEPLOY_TARGET }} &&
            echo 🔁 Restarting docker stack... &&
            docker compose down || true &&
            docker system prune -f &&
            docker rmi ${{ env.IMAGE_NAME }} || true &&
            docker load -i ./frontend.tar &&
            docker compose up -d
          \""

