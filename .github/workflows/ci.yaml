name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  NODE_VERSION: 22
  PNPM_VERSION: 9.15.0

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          pnpm install
          pnpm run prepare

      - name: Cache .nuxt
        uses: actions/cache@v4
        with:
          path: .nuxt
          key: ${{ runner.os }}-nuxt-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nuxt-

  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Restore .nuxt cache
        uses: actions/cache@v4
        with:
          path: .nuxt
          key: ${{ runner.os }}-nuxt-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nuxt-

      - name: Run lint
        run: |
          echo "🔍 Running lint..."
          pnpm lint

      - name: Run TypeScript type check
        run: |
          echo "🔍 Running TypeScript type check..."
          pnpm typecheck
